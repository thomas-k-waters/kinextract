# Read the Docs configuration file
# See https://docs.readthedocs.io/en/stable/config-file/v2.html for details

# Required
version: 2

# Set the OS, Python version, and other tools you might need
build:
  os: ubuntu-24.04
  tools:
    python: "3.12"

# Build documentation in the "docs/" directory with Sphinx
sphinx:
  configuration: docs/conf.py

# Install kinextract itself (so autodoc/autosummary can import it and its
# dependencies) plus the "docs" extra (sphinx, sphinx-rtd-theme, myst-parser,
# sphinx-copybutton) and "bayesian" (numpyro -- needed so the optional
# kinextract.bayesian module documented in docs/api.rst can actually be
# imported) -- see pyproject.toml's [project.optional-dependencies].
python:
  install:
    - method: pip
      path: .
      extra_requirements:
        - docs
        - bayesian
